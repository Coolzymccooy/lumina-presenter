name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    name: Verify Before Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npm run test:e2e:install

      - name: Build web app
        run: npm run build

      - name: Run smoke tests
        run: npm run test:e2e:smoke

  publish-windows:
    name: Build and Publish Windows Assets
    needs: verify
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows artifacts
        run: npm run dist:win:ci

      - name: Publish GitHub release (non-draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release/*.exe
            release/*.msi
            release/*.yml
            release/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-macos:
    name: Build and Publish macOS Assets
    needs: verify
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS artifacts
        env:
          CSC_LINK_SECRET: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -z "$CSC_LINK_SECRET" || -z "$CSC_KEY_PASSWORD_SECRET" || -z "$APPLE_ID_SECRET" || -z "$APPLE_APP_SPECIFIC_PASSWORD_SECRET" || -z "$APPLE_TEAM_ID_SECRET" ]]; then
            echo "Missing required Apple signing/notarization secrets. Refusing to publish an unsigned or unnotarized macOS app."
            exit 1
          fi

          export CSC_LINK="$CSC_LINK_SECRET"
          export CSC_KEY_PASSWORD="$CSC_KEY_PASSWORD_SECRET"
          export APPLE_ID="$APPLE_ID_SECRET"
          export APPLE_APP_SPECIFIC_PASSWORD="$APPLE_APP_SPECIFIC_PASSWORD_SECRET"
          export APPLE_TEAM_ID="$APPLE_TEAM_ID_SECRET"
          echo "Building signed, hardened, notarized universal macOS artifacts."

          npm run dist:mac:ci

      - name: Verify macOS signing
        run: |
          APP_PATH="$(find release -maxdepth 2 -name 'Lumina Presenter.app' | head -n 1)"
          if [[ -z "$APP_PATH" ]]; then
            echo "Could not find built app bundle for verification."
            exit 1
          fi
          codesign --verify --deep --strict "$APP_PATH"
          spctl -a -vv --type exec "$APP_PATH"

      - name: Publish GitHub release (non-draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: false
          fail_on_unmatched_files: false
          files: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
