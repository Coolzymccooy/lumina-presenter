name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    name: Verify Before Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3 for system Node
        run: npm rebuild better-sqlite3

      - name: Install Playwright browser
        run: npm run test:e2e:install

      - name: Build web app
        env:
          VITE_AI_WEB_LYRICS_FETCH: 'true'
        run: npm run build

      - name: Run smoke tests
        run: npm run test:e2e:smoke

  publish-windows:
    name: Build and Publish Windows Assets
    needs: verify
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows artifacts
        env:
          VITE_AI_WEB_LYRICS_FETCH: 'true'
        run: npm run dist:win:ci

      - name: Publish GitHub release (non-draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release/*.exe
            release/*.msi
            release/*.yml
            release/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-macos:
    name: Build and Publish macOS Assets
    needs: verify
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore distutils for Python 3.12+
        run: pip3 install --break-system-packages setuptools

      - name: Build macOS artifacts (unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          VITE_AI_WEB_LYRICS_FETCH: 'true'
        run: |
          echo "Building unsigned universal macOS artifacts (no Apple signing credentials configured)."
          npm run dist:mac:ci

      - name: Publish GitHub release (non-draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: false
          fail_on_unmatched_files: false
          files: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
