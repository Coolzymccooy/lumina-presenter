name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  smoke:
    name: Build + Smoke E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3 for system Node
        # postinstall runs electron-rebuild which compiles better-sqlite3 against
        # Electron's Node ABI. The server process runs on system Node, so we must
        # recompile for the correct ABI before starting the server.
        run: npm rebuild better-sqlite3

      - name: Install Playwright browser
        run: npm run test:e2e:install

      - name: Build web app
        run: npm run build

      - name: Run smoke tests
        run: npm run test:e2e:smoke

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-artifacts
          if-no-files-found: ignore
          path: |
            playwright-report
            test-results

  regression:
    name: Full E2E Regression
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3 for system Node
        run: npm rebuild better-sqlite3

      - name: Install Playwright browser
        run: npm run test:e2e:install

      - name: Run full E2E tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-regression-artifacts
          if-no-files-found: ignore
          path: |
            playwright-report
            test-results

